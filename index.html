<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>쇼핑 리스트</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #f0f4f8;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }

    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      width: 100%;
      max-width: 480px;
      padding: 32px 28px 28px;
      height: fit-content;
    }

    h1 {
      font-size: 1.6rem;
      color: #1a202c;
      margin-bottom: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }

    .input-row input {
      flex: 1;
      padding: 11px 14px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      color: #2d3748;
      transition: border-color 0.2s;
      outline: none;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row button {
      padding: 11px 18px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
      white-space: nowrap;
    }

    .input-row button:hover {
      background: #5a67d8;
    }

    .input-row button:disabled {
      background: #a0aec0;
      cursor: not-allowed;
    }

    .summary {
      font-size: 0.85rem;
      color: #718096;
      margin-bottom: 12px;
    }

    .summary span {
      font-weight: 600;
      color: #667eea;
    }

    ul {
      list-style: none;
    }

    li {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 12px;
      border-radius: 10px;
      transition: background 0.15s;
      border-bottom: 1px solid #f7fafc;
    }

    li:last-child {
      border-bottom: none;
    }

    li:hover {
      background: #f7fafc;
    }

    li.checked {
      opacity: 0.5;
    }

    .checkbox {
      width: 22px;
      height: 22px;
      border: 2px solid #cbd5e0;
      border-radius: 6px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: background 0.15s, border-color 0.15s;
    }

    .checkbox.checked {
      background: #667eea;
      border-color: #667eea;
    }

    .checkbox.checked::after {
      content: '✓';
      color: #fff;
      font-size: 13px;
      font-weight: 700;
    }

    .item-text {
      flex: 1;
      font-size: 1rem;
      color: #2d3748;
      transition: text-decoration 0.15s;
    }

    li.checked .item-text {
      text-decoration: line-through;
      color: #a0aec0;
    }

    .delete-btn {
      background: none;
      border: none;
      color: #cbd5e0;
      font-size: 1.2rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      line-height: 1;
      transition: color 0.15s, background 0.15s;
    }

    .delete-btn:hover {
      color: #e53e3e;
      background: #fff5f5;
    }

    .empty {
      text-align: center;
      color: #a0aec0;
      padding: 40px 0 20px;
      font-size: 0.95rem;
    }

    .clear-btn {
      width: 100%;
      margin-top: 16px;
      padding: 10px;
      background: none;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      color: #a0aec0;
      font-size: 0.9rem;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .clear-btn:hover {
      border-color: #e53e3e;
      color: #e53e3e;
    }

    .loading {
      text-align: center;
      color: #a0aec0;
      padding: 20px 0;
      font-size: 0.9rem;
    }

    .error-msg {
      text-align: center;
      color: #e53e3e;
      padding: 10px 0;
      font-size: 0.85rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🛒 쇼핑 리스트</h1>
    <div class="input-row">
      <input type="text" id="itemInput" placeholder="아이템을 입력하세요..." maxlength="60">
      <button id="addBtn" onclick="addItem()">추가</button>
    </div>
    <div class="summary" id="summary"></div>
    <div class="loading" id="loading">불러오는 중...</div>
    <div class="error-msg" id="errorMsg" style="display:none"></div>
    <ul id="list"></ul>
    <div class="empty" id="empty" style="display:none">아직 아이템이 없어요.<br>위에서 추가해 보세요!</div>
    <button class="clear-btn" id="clearBtn" onclick="clearChecked()" style="display:none">
      완료된 항목 삭제
    </button>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://nyhytxaskqkyztuxqbus.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im55aHl0eGFza3FreXp0dXhxYnVzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NTM4MDQsImV4cCI6MjA5MjMyOTgwNH0.AE5Kd1_xylOWJNWoTRpxogreqxxBas2TsKL2LSoH5x0';

    const { createClient } = supabase;
    const db = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    let items = [];

    function showError(msg) {
      const el = document.getElementById('errorMsg');
      el.textContent = msg;
      el.style.display = msg ? 'block' : 'none';
    }

    function render() {
      const list = document.getElementById('list');
      const empty = document.getElementById('empty');
      const summary = document.getElementById('summary');
      const clearBtn = document.getElementById('clearBtn');
      const loading = document.getElementById('loading');

      loading.style.display = 'none';
      list.innerHTML = '';

      if (items.length === 0) {
        empty.style.display = 'block';
        summary.textContent = '';
        clearBtn.style.display = 'none';
        return;
      }

      empty.style.display = 'none';

      const total = items.length;
      const done = items.filter(i => i.checked).length;
      summary.innerHTML = `총 <span>${total}</span>개 · 완료 <span>${done}</span>개`;
      clearBtn.style.display = done > 0 ? 'block' : 'none';

      items.forEach((item) => {
        const li = document.createElement('li');
        if (item.checked) li.classList.add('checked');

        const cb = document.createElement('div');
        cb.className = 'checkbox' + (item.checked ? ' checked' : '');
        cb.onclick = () => toggle(item);

        const text = document.createElement('span');
        text.className = 'item-text';
        text.textContent = item.name;

        const del = document.createElement('button');
        del.className = 'delete-btn';
        del.innerHTML = '✕';
        del.title = '삭제';
        del.onclick = () => remove(item.id);

        li.appendChild(cb);
        li.appendChild(text);
        li.appendChild(del);
        list.appendChild(li);
      });
    }

    async function loadItems() {
      const { data, error } = await db
        .from('shopping_items')
        .select('*')
        .order('created_at', { ascending: true });

      if (error) {
        showError('데이터를 불러오지 못했습니다: ' + error.message);
        document.getElementById('loading').style.display = 'none';
        return;
      }

      items = data;
      render();
    }

    async function addItem() {
      const input = document.getElementById('itemInput');
      const name = input.value.trim();
      if (!name) return;

      const btn = document.getElementById('addBtn');
      btn.disabled = true;

      const { data, error } = await db
        .from('shopping_items')
        .insert([{ name, checked: false }])
        .select()
        .single();

      btn.disabled = false;

      if (error) {
        showError('추가 실패: ' + error.message);
        return;
      }

      showError('');
      items.push(data);
      render();
      input.value = '';
      input.focus();
    }

    async function toggle(item) {
      const { error } = await db
        .from('shopping_items')
        .update({ checked: !item.checked })
        .eq('id', item.id);

      if (error) {
        showError('업데이트 실패: ' + error.message);
        return;
      }

      showError('');
      item.checked = !item.checked;
      render();
    }

    async function remove(id) {
      const { error } = await db
        .from('shopping_items')
        .delete()
        .eq('id', id);

      if (error) {
        showError('삭제 실패: ' + error.message);
        return;
      }

      showError('');
      items = items.filter(i => i.id !== id);
      render();
    }

    async function clearChecked() {
      const checkedIds = items.filter(i => i.checked).map(i => i.id);
      if (checkedIds.length === 0) return;

      const { error } = await db
        .from('shopping_items')
        .delete()
        .in('id', checkedIds);

      if (error) {
        showError('삭제 실패: ' + error.message);
        return;
      }

      showError('');
      items = items.filter(i => !i.checked);
      render();
    }

    document.getElementById('itemInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addItem();
    });

    loadItems();
  </script>
</body>
</html>
